name: Ruff Lint

on:
  pull_request:
    paths:
      - "**.py"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --only-group dev
      - run: uv run ruff check --output-format=github .
      - run: uv run ruff format --check .
